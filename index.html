<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Lagu Pribadi</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <h1>AlArsy</h1>
        <p>Single Song.</p>
      </div>
      <div class="hero-image">
        <label class="photo-upload" for="profile-photo">
          <div class="photo-frame">
            <img id="profile-photo-preview" src="image/alarsy08.PNG" alt="Foto Alarsy" />
          </div>
        </label>
        <input type="file" id="profile-photo" accept="image/*" hidden />
      </div>
    </header>

    <main>
      <section class="player-card">
        <div class="track-info">
          <div class="track-meta">
            <p id="track-title">Karena Kita Berbeda</p>
            <p id="track-artist">AlArsy</p>
          </div>
          <audio id="audio-player" controls preload="metadata">
            <source src="audio/Karena-Kita-Berbeda.mp3" type="audio/mpeg" />
          </audio>
        </div>
      </section>

      <section class="playlist-section">
        <h2>Daftar Lagu</h2>
        <div id="playlist" class="playlist"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
